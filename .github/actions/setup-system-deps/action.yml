name: Setup system deps
description: Install GTK4, gtk4-layer-shell (built from source), and optionally Xvfb.
inputs:
  xvfb:
    description: Also install Xvfb + dbus-x11 for headless GTK tests.
    required: false
    default: "false"
  gtk4-layer-shell-ref:
    description: Git ref of wmww/gtk4-layer-shell to build.
    required: false
    default: v1.3.0

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        sudo apt-get update
        # gtk4-layer-shell has no apt package on ubuntu-latest, so we build it
        # from source below. These are its and our crate's other system deps.
        PKGS="libgtk-4-dev libwayland-dev gobject-introspection libgirepository1.0-dev meson ninja-build pkg-config valac"
        if [ "${{ inputs.xvfb }}" = "true" ]; then
          PKGS="$PKGS xvfb dbus-x11"
        fi
        sudo apt-get install -y $PKGS

    - name: Cache gtk4-layer-shell build
      id: cache-gls
      uses: actions/cache@v4
      with:
        path: /usr/local/lib/x86_64-linux-gnu/pkgconfig/gtk4-layer-shell-0.pc
        key: gtk4-layer-shell-${{ inputs.gtk4-layer-shell-ref }}-${{ runner.os }}

    - name: Build and install gtk4-layer-shell from source
      if: steps.cache-gls.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth=1 --branch ${{ inputs.gtk4-layer-shell-ref }} \
          https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
        cd /tmp/gtk4-layer-shell
        meson setup -Dexamples=false -Ddocs=false -Dtests=false build
        ninja -C build
        sudo ninja -C build install
        sudo ldconfig

    - name: Refresh linker cache
      shell: bash
      run: sudo ldconfig
